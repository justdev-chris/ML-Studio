name: Build MeowyLoops Studio (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install git -y
        shell: powershell

      - name: Setup Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtbase qttools'

      - name: Install vcpkg dependencies
        run: |
          vcpkg install portaudio:x64-windows libsndfile:x64-windows rtmidi:x64-windows
        shell: powershell

      - name: Download VST3 SDK
        run: |
          mkdir -p libs/vst3sdk
          curl -L -o libs/vst3sdk/vst3sdk.zip "https://www.steinberg.net/vst3sdk"
          cd libs/vst3sdk
          unzip -q vst3sdk.zip
          mv VST_SDK/* .
          rm -rf VST_SDK
          rm vst3sdk.zip
        shell: bash

      - name: Download LV2 SDK
        run: |
          mkdir -p libs/lv2
          curl -L -o libs/lv2/lv2.zip "https://github.com/lv2/lv2/archive/refs/tags/v1.18.10.zip"
          cd libs/lv2
          unzip -q lv2.zip
          mv lv2-*/* .
          rm -rf lv2-*
          rm lv2.zip
        shell: bash

      - name: Download CLAP SDK
        run: |
          mkdir -p libs/clap
          curl -L -o libs/clap/clap.zip "https://github.com/free-audio/clap/archive/refs/tags/1.1.9.zip"
          cd libs/clap
          unzip -q clap.zip
          mv clap-*/* .
          rm -rf clap-*
          rm clap.zip
        shell: bash

      - name: Configure CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DUSE_SYSTEM_LIBS=OFF `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
        shell: powershell

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeowyLoopsStudio-Windows
          path: build/Release/MeowyLoopsStudio.exe
